name: 🚦 CI
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          cache-dependency-path: ./package-lock.json
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm t
